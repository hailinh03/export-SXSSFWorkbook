# SPRING BOOT CORE CONFIGURATION
spring:
  application:
    name: sxxsworkbook

  datasource:
    url: jdbc:oracle:thin:@//localhost:1521/FREEPDB1
    username: report_excel_user
    password: report_excel
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      pool-name: OracleHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1 FROM DUAL

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
        default_schema: REPORT_EXCEL_USER

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# SERVER & API CONFIGURATION
server:
  port: 8080
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs

# APPLICATION CUSTOM CONFIGURATION
app:
  excel:
    sxssf:
      row-access-window-size: 100    # SXSSFWorkbook: Chỉ giữ tối đa 100 dòng trên RAM
  mail:
    sender-name: "Transaction Export System"
    default-recipient: ${SPRING_MAIL_RECEIVED} # Đọc từ file .env (Email hứng nhận file)

# LOGGING SYSTEM CONFIGURATION
logging:
  level:
    com.example.sxxsworkbook: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.mail: DEBUG