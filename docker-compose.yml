version: '3.8'

services:
  oracle-db:
    image: container-registry.oracle.com/database/free:latest
    container_name: omnibank-oracle-excel
    ports:
      - "1521:1521"
    environment:
      ORACLE_PWD: Oracle123        # SYS / SYSTEM password
      ORACLE_CHARACTERSET: AL32UTF8
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./oracle-init:/opt/oracle/scripts/startup    # Auto-run SQL scripts on startup
    healthcheck:
      test: ["CMD", "sqlplus", "-S", "system/Oracle123#@localhost:1521/XEPDB1", "<<<", "SELECT 1 FROM DUAL;"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped
    shm_size: '1gb'

volumes:
  oracle-data:
    driver: local
